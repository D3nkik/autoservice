# Этот конфиг нужно добавить в секцию server{} основного nginx конфига
# для домена 24rasp.ru
#
# Расположение (зависит от хостинга):
#   /etc/nginx/conf.d/24rasp.ru.conf  — или другой файл конфига вашего сайта
#
# Добавьте эти location блоки ПЕРЕД существующими блоками вашего сайта

# API backend (Express) — порт 4000
location /api/ {
    proxy_pass         http://127.0.0.1:4000/api/;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
}

# Frontend Next.js — порт 3001, путь /auto
location /auto {
    proxy_pass         http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection 'upgrade';
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
}

# Next.js статика
location /_next/ {
    proxy_pass http://127.0.0.1:3001/_next/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
}
